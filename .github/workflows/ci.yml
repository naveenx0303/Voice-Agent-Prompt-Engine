name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Unit & integration tests
        run: npm test
      - name: Validate all example configs
        run: |
          for f in examples/*.json; do
            node src/cli.js --config "$f" --validate-only
          done
      - name: Compile all examples (smoke test)
        run: |
          mkdir -p dist
          for f in examples/*.json; do
            name=$(basename "$f" .json)
            node src/cli.js --config "$f" --out "dist/$name.prompt.txt"
          done
